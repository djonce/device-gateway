services:
  gateway:
    build: .
    image: light-gateway:latest
    container_name: light-gateway
    restart: unless-stopped
    ports:
      - "7001:7001"
    environment:
      # API + admin console both served on :7001
      LIGHT_GATEWAY_DATA: /data/light-gateway.db
      # One-click defaults — login is admin / lightgateway out of the box.
      # CHANGE THESE for any real deployment (set them in a local .env file).
      LIGHT_ADMIN_USER: ${LIGHT_ADMIN_USER:-admin}
      LIGHT_ADMIN_PASSWORD: ${LIGHT_ADMIN_PASSWORD:-lightgateway}
      LIGHT_PROVISION_KEY: ${LIGHT_PROVISION_KEY:-lightgateway-enroll}
      # Optional voice pipeline
      LIGHT_VOICE_LLM_URL: ${LIGHT_VOICE_LLM_URL:-}
      LIGHT_VOICE_LLM_KEY: ${LIGHT_VOICE_LLM_KEY:-}
      LIGHT_VOICE_LLM_MODEL: ${LIGHT_VOICE_LLM_MODEL:-}
      LIGHT_VOICE_ASR_URL: ${LIGHT_VOICE_ASR_URL:-}
      LIGHT_VOICE_TTS_URL: ${LIGHT_VOICE_TTS_URL:-}
    volumes:
      - gwdata:/data
    healthcheck:
      test: ["CMD", "/app/light-gateway", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gwdata:
